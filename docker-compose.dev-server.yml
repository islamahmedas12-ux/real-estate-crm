# ==============================================================================
# Real Estate CRM — Dev Server Deployment (uses pre-built GHCR image)
# ==============================================================================
#
# Used by CD pipeline to deploy to dev server (34.24.201.183)
# Unlike docker-compose.dev-full.yml, this uses the built image from GHCR
# not source-mount dev mode.
#
# Usage on server:
#   export APP_IMAGE=ghcr.io/islamahmedas12-ux/real-estate-crm:dev
#   docker-compose -f docker-compose.dev-server.yml up -d
# ==============================================================================

services:
  # NOTE: CRM PostgreSQL is the standalone `postgres-dev` container on port 5432
  # App connects via host.docker.internal:5432 (no separate db service here)

  # ── AuthMe PostgreSQL ───────────────────────────────────────────────────────
  authme-db:
    image: postgres:16-alpine
    restart: unless-stopped
    container_name: crm-dev-authme-db
    environment:
      POSTGRES_USER: authme
      POSTGRES_PASSWORD: authme
      POSTGRES_DB: authme
    volumes:
      - authme-pgdata-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authme"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - crm-dev-network

  # ── AuthMe IAM ──────────────────────────────────────────────────────────────
  authme:
    image: islamawad/authme
    restart: unless-stopped
    container_name: crm-dev-authme
    environment:
      DATABASE_URL: postgresql://authme:authme@authme-db:5432/authme
      PORT: "3001"
      BASE_URL: http://dev-auth.realstate-crm.homes
      WEBHOOK_SECRET_KEY: dev-webhook-secret-6cc4fb3d383e0e3682dc013ffa533f1322c7cdea
      WEBHOOK_ENCRYPTION_SALT: dev-encryption-salt-a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4
    ports:
      - "3001:3001"
    depends_on:
      authme-db:
        condition: service_healthy
    networks:
      - crm-dev-network

  # ── NestJS Backend (pre-built image from GHCR) ──────────────────────────────
  app:
    image: ${APP_IMAGE:-ghcr.io/islamahmedas12-ux/real-estate-crm:dev}
    restart: unless-stopped
    container_name: crm-dev-app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      # Connect to the standalone postgres-dev container via host network
      DATABASE_URL: postgresql://crm_user:real-estate-dev-password-123@host.docker.internal:5432/real_estate_crm_dev
      AUTHME_URL: http://crm-dev-authme:3001
      AUTHME_REALM: real-estate-dev
      AUTHME_CLIENT_ID: crm-backend
      AUTHME_CLIENT_SECRET: dev-secret
      ADMIN_PORTAL_URL: http://dev-admin.realstate-crm.homes
      AGENT_PORTAL_URL: http://dev-agent.realstate-crm.homes
      UPLOAD_DIR: /app/uploads
      JWT_SECRET: dev-jwt-secret-change-in-prod
      REDIS_URL: redis://crm-dev-redis:6379
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - uploads-dev:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 10s
      start_period: 30s
      retries: 5
    networks:
      - crm-dev-network

  # ── Redis (for queue) ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    container_name: crm-dev-redis
    networks:
      - crm-dev-network

volumes:
  authme-pgdata-dev:
    driver: local
  uploads-dev:
    driver: local

networks:
  crm-dev-network:
    driver: bridge
