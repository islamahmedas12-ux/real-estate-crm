# ==============================================================================
# Real Estate CRM — Nginx Reverse Proxy Configuration
# ==============================================================================

upstream nestjs {
    server app:3000;
}

# Hide Nginx version from Server header
server_tokens off;

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Max upload size (for property images, contract docs)
    client_max_body_size 50M;

    # ── API requests → NestJS backend ────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=50 nodelay;

        proxy_pass http://nestjs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ── Uploaded files → NestJS (served via the uploads controller) ──────────
    location /uploads/ {
        proxy_pass http://nestjs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache uploaded files aggressively
        proxy_cache_valid 200 1d;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── Admin UI (React SPA) ────────────────────────────────────────────────
    location /admin {
        alias /usr/share/nginx/html/admin;
        try_files $uri $uri/ /admin/index.html;

        # Cache static assets
        location ~* /admin/assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Agent UI (React SPA) ────────────────────────────────────────────────
    location /agent {
        alias /usr/share/nginx/html/agent;
        try_files $uri $uri/ /agent/index.html;

        # Cache static assets
        location ~* /agent/assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Root → redirect to admin portal ─────────────────────────────────────
    location = / {
        return 302 /admin;
    }

    # ── Health check endpoint for load balancers ────────────────────────────
    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ── Suppress favicon 404 ──────────────────────────────────────────────
    location = /favicon.ico {
        return 204;
        access_log off;
        log_not_found off;
    }

    # ── Deny dotfiles ───────────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
