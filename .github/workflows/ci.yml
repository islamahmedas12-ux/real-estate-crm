name: CI

on:
  pull_request:
    branches: [dev, qa, uat, prod, master]
  push:
    branches: [dev, qa, uat, prod, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"

jobs:
  # ── Backend: Lint, Type-check, Test, Build ─────────────────────────────
  backend:
    name: CI / Backend (lint, typecheck, test, build)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: real_estate_crm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/real_estate_crm_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Lint
        run: npm run lint -- --max-warnings 0

      - name: Type check
        run: npx tsc --noEmit

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: Unit tests
        run: npm run test -- --ci --coverage

      - name: Build
        run: npm run build

  # ── Admin UI ───────────────────────────────────────────────────────────
  admin-ui:
    name: CI / Frontend Admin UI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: admin-ui

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: admin-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check & Build
        run: npm run build

  # ── Agent UI ───────────────────────────────────────────────────────────
  agent-ui:
    name: CI / Frontend Agent UI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: agent-ui

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: agent-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check & Build
        run: npm run build

  # ── Flutter Mobile ─────────────────────────────────────────────────────
  mobile:
    name: CI / Mobile (Flutter)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --verbose

      - name: Test
        run: flutter test

  # ── Docker Build ───────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, admin-ui, agent-ui]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: real-estate-crm:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
