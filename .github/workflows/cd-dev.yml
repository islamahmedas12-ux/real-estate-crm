name: CD → Dev

on:
  push:
    branches: [dev]

concurrency:
  group: cd-dev
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Build & Push Docker Image ──────────────────────────────────────────
  build-and-push:
    name: Build & Push to Dev
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=dev
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Run migrations ──────────────────────────────────────────────────────
  migrate:
    name: Database Migration (Dev)
    runs-on: ubuntu-latest
    needs: build-and-push
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}

  # ── Deploy to Dev Environment ───────────────────────────────────────────
  deploy:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: [build-and-push, migrate]
    
    steps:
      - name: SSH Deploy to Dev Server
        env:
          SSH_KEY: ${{ secrets.DEV_SERVER_SSH_KEY }}
          SSH_HOST: ${{ secrets.DEV_SERVER_HOST }}
          SSH_USER: islam
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts
          
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST << 'EOF'
          cd /apps/real-estate-crm
          docker-compose pull
          docker-compose up -d
          EOF
          
          rm ~/.ssh/deploy_key

      - name: Notify Slack (Success)
        if: success()
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-Type: application/json' \
            -d '{
              "text": "✅ Dev deployment successful",
              "attachments": [{
                "color": "good",
                "text": "Branch: dev\nCommit: ${{ github.sha }}"
              }]
            }'

      - name: Notify Slack (Failure)
        if: failure()
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-Type: application/json' \
            -d '{
              "text": "❌ Dev deployment failed",
              "attachments": [{
                "color": "danger",
                "text": "Branch: dev\nCommit: ${{ github.sha }}"
              }]
            }'
