# ==============================================================================
# Real Estate CRM — Production Docker Compose
# ==============================================================================
#
# Usage:
#   cp .env.example .env       # configure secrets
#   docker compose up -d       # start all services
#   docker compose logs -f     # follow logs
#   docker compose down        # stop all services
# ==============================================================================

services:
  # ── PostgreSQL 16 ──────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-real_estate_crm}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── NestJS Backend ─────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-real_estate_crm}
      AUTHME_URL: ${AUTHME_URL:-http://localhost:3001}
      AUTHME_REALM: ${AUTHME_REALM:-real-estate}
      AUTHME_CLIENT_ID: ${AUTHME_CLIENT_ID:-crm-backend}
      AUTHME_CLIENT_SECRET: ${AUTHME_CLIENT_SECRET:-}
      ADMIN_PORTAL_URL: ${ADMIN_PORTAL_URL:-https://crm.example.com/admin}
      AGENT_PORTAL_URL: ${AGENT_PORTAL_URL:-https://crm.example.com/agent}
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    networks:
      - internal

  # ── Nginx Reverse Proxy ────────────────────────────────────────────────────
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    depends_on:
      app:
        condition: service_healthy
    networks:
      - internal

volumes:
  pgdata:
    driver: local
  uploads:
    driver: local

networks:
  internal:
    driver: bridge
