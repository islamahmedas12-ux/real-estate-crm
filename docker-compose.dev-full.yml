# ==============================================================================
# Real Estate CRM — Full Dev Environment
# ==============================================================================
#
# Usage:
#   cp .env.dev .env
#   docker compose -f docker-compose.dev-full.yml up -d
#   docker compose -f docker-compose.dev-full.yml logs -f
#
# Services:
#   - db           PostgreSQL 16 (CRM)           :5432
#   - authme-db    PostgreSQL 16 (AuthMe)         :5433
#   - authme       AuthMe IAM server              :3001
#   - app          NestJS backend                  :3000
#   - admin-ui     Admin portal (Vite)             :5173
#   - agent-ui     Agent portal (Vite)             :5174
# ==============================================================================

services:
  # ── CRM PostgreSQL ──────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: real_estate_crm
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - crm-dev-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  # ── AuthMe PostgreSQL ───────────────────────────────────────────────────────
  authme-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: authme
      POSTGRES_PASSWORD: authme
      POSTGRES_DB: authme
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - authme-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authme"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - crm-dev-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ── AuthMe IAM Server ──────────────────────────────────────────────────────
  authme:
    image: islamawad/authme
    restart: unless-stopped
    environment:
      DB_HOST: authme-db
      DB_PORT: "5432"
      DB_USER: authme
      DB_PASSWORD: authme
      DB_NAME: authme
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      authme-db:
        condition: service_healthy
    networks:
      - crm-dev-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  # ── NestJS Backend ──────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    command: npm run start:dev
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/real_estate_crm
      AUTHME_URL: http://authme:3001
      NODE_ENV: development
      PORT: "3000"
    depends_on:
      db:
        condition: service_healthy
      authme:
        condition: service_started
    networks:
      - crm-dev-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  # ── Admin UI (Vite React) ──────────────────────────────────────────────────
  admin-ui:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./admin-ui:/app
      - /app/node_modules
    ports:
      - "127.0.0.1:5173:5173"
    environment:
      NODE_ENV: development
    depends_on:
      - app
    networks:
      - crm-dev-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  # ── Agent UI (Vite React) ──────────────────────────────────────────────────
  agent-ui:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5174"
    volumes:
      - ./agent-ui:/app
      - /app/node_modules
    ports:
      - "127.0.0.1:5174:5174"
    environment:
      NODE_ENV: development
    depends_on:
      - app
    networks:
      - crm-dev-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

volumes:
  pgdata:
    driver: local
  authme-pgdata:
    driver: local

networks:
  crm-dev-network:
    driver: bridge
